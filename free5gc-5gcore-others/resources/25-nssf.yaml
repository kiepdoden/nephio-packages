kind: ConfigMap
metadata:
  labels:
    app: free5gc
  name: free5gc-free5gc-nssf-configmap
  namespace: 5gcore  # kpt-set: ${namespace}
---
apiVersion: v1
kind: Service
metadata:
  labels:
    app.kubernetes.io/instance: free5gc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: free5gc-nssf
    app.kubernetes.io/version: latest
    helm.sh/chart: free5gc-nssf-0.2.7
    nf: nssf
    project: free5gc
  name: free5gc-free5gc-nssf-service
  namespace: 5gcore  # kpt-set: ${namespace}
spec:
  ports:
    - name: http
      port: 80
      protocol: TCP
      targetPort: 80
  selector:
    app.kubernetes.io/instance: free5gc
    app.kubernetes.io/name: free5gc-nssf
    nf: nssf
    project: free5gc
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/instance: free5gc
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/name: free5gc-nssf
    app.kubernetes.io/version: latest
    helm.sh/chart: free5gc-nssf-0.2.7
    nf: nssf
    project: free5gc
  name: free5gc-free5gc-nssf-nssf
  namespace: 5gcore  # kpt-set: ${namespace}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/instance: free5gc
      app.kubernetes.io/name: free5gc-nssf
      nf: nssf
      project: free5gc
  template:
    metadata:
      annotations:
        checksum/config: ed322c8184e8e071bae50ad0ab8ac9076c024a4149d40854d393630f334b9d48
      labels:
        app.kubernetes.io/instance: free5gc
        app.kubernetes.io/name: free5gc-nssf
        nf: nssf
        project: free5gc
    spec:
      affinity: {}
      containers:
        - args:
            - -c
            - ./config/nssfcfg.yaml
          command:
            - ./nssf
          env:
            - name: GIN_MODE
              value: release
          image: free5gc/nssf:v4.0.1  # kpt-set: ${image-nssf}
          imagePullPolicy: Always
          name: nssf
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
          securityContext: {}
          volumeMounts:
            - mountPath: /free5gc/config/
              name: free5gc-free5gc-nssf-volume
            - mountPath: /free5gc/config/TLS
              name: free5gc-free5gc-nssf-empty-volume
            - mountPath: /free5gc/cert
              name: free5gc-free5gc-nssf-cert-pvc
      dnsPolicy: ClusterFirst
      imagePullSecrets: []
      initContainers:
        - command:
            - sh
            - -c
            - set -x; for dependency in $DEPENDENCIES; do while [ $(curl --insecure --connect-timeout 1 -s -o /dev/null -w "%{http_code}" $dependency) -ne 200 ]; do echo waiting for dependencies; sleep 1; done; done;
          env:
            - name: DEPENDENCIES
              value: http://nrf-nnrf:8000
          image: curlimages/curl:8.7.1
          name: wait-nrf
      nodeSelector: {}
      restartPolicy: Always
      securityContext: {}
      tolerations: []
      volumes:
        - name: free5gc-free5gc-nssf-volume
          projected:
            sources:
              - configMap:
                  name: free5gc-free5gc-nssf-configmap
        - emptyDir: {}
          name: free5gc-free5gc-nssf-empty-volume
        - name: free5gc-free5gc-nssf-cert-pvc
          persistentVolumeClaim:
            claimName: cert-pvc
