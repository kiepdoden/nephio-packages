# CloudNICPool Azure — dùng khi Migrate.spec.cluster.location.multiCluster.cluster.name: azure
# CR mẫu tham khảo (kubectl get cloudnicpools -o yaml, đã bỏ status/resourceVersion/uid).
# Điền đúng subscriptionID/resourceGroup/subnet của tenant Azure thật trước khi apply.

apiVersion: upf.ahihi.ahuhu/v1
kind: CloudNICPool
metadata:
  name: azure-n3
spec:
  azureAttachPolicy: DeallocateIfNeeded
  cloud: azure
  disableSourceDestCheck: true
  networkFunction: n3
  nodeSelector:
    matchLabels:
      node-role.upf/candidate: "true"
  refillPolicy: Always
  region: eastus2
  resourceGroup: rg-upf-migrate-azure
  size: 3
  subnet: /subscriptions/91414a5d-9d4e-4b1a-8de6-d0a95a6d0490/resourceGroups/rg-upf-migrate-azure/providers/Microsoft.Network/virtualNetworks/vnet-upf-azure/subnets/snet-upf-n3-41
  subscriptionID: 91414a5d-9d4e-4b1a-8de6-d0a95a6d0490
  zone: eastus-2
---
