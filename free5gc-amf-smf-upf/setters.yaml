apiVersion: v1
kind: ConfigMap
metadata:
  name: setters
  annotations:
    config.kubernetes.io/local-config: "true"
data:
  # Namespace of AMF/SMF, shared with package free5gc-5gcore-others
  namespace: 5gcore
  # Namespace of the UPF pod + its NAD/ConfigMap (matches live cluster: UPF runs in `default`, not `5gcore`)
  upf-namespace: default
  # Container images
  image-amf: free5gc/amf:v4.0.0
  image-smf: kiemtcb/smf:v4.0.0-sdn
  image-upf: docker.io/kiemtcb/upf-test:nextmn-test-not-debug
  # Node pinning: SMF ghim cứng vào node này (nodeSelector + nodeAffinity In).
  # UPF không ghim node riêng — chỉ tránh đúng node SMF đang chạy (nodeAffinity NotIn,
  # dùng chung giá trị này) để 2 NF luôn nằm khác node nhau, không hard-code node UPF.
  smf-node: ip-192-168-10-12
