apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n4-conf
  namespace: default # kpt-set: ${upf-namespace}
spec:
  config: |-
    {
      "cniVersion": "0.3.0",
      "type": "ipvlan",
      "master": "ens7",
      "mode": "l2",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.50.0/24"
      }
    }
