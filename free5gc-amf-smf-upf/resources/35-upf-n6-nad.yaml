apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: n6-conf
  namespace: default # kpt-set: ${upf-namespace}
spec:
  config: |-
    {
      "cniVersion": "0.3.0",
      "type": "ipvlan",
      "master": "ens8",
      "mode": "l2",
      "ipam": {
        "type": "host-local",
        "subnet": "192.168.60.0/24",
        "routes": [                                                                                                                                        │
        {                                                                                                                                                  │
          "dst": "192.168.61.0/24",                                                                                                                        │
          "gw": "192.168.60.1"                                                                                                                             │
        }]
      }
    }
