# CloudNICPool instances đang chạy thật trên cluster (kubectl get cloudnicpools -o yaml,
# đã bỏ status/resourceVersion/uid — status.available là NIC warm-pool runtime, enipool-manager
# tự refill lại khi apply).

# ---- AWS: dùng khi Migrate.spec.cluster.location.multiCluster.cluster.name: cluster1 ----
apiVersion: upf.ahihi.ahuhu/v1
kind: CloudNICPool
metadata:
  name: cluster1-n3
spec:
  cloud: aws
  disableSourceDestCheck: true
  networkFunction: n3
  nodeSelector:
    matchLabels:
      node-role.upf/candidate: "true"
  refillPolicy: Always
  region: us-east-2 # kpt-set: ${aws-region}
  securityGroups:
    - sg-0774cb54f05a1f854
  size: 3
  subnet: subnet-003529ac1f69c118f
  zone: us-east-2b
---
