apiVersion: v1
kind: Service
metadata:
  labels:
    karmada.io/bootstrapping: service-defaults
  name: etcd
  namespace: karmada-system  # kpt-set: ${namespace}
spec:
  internalTrafficPolicy: Cluster
  ipFamilies:
  - IPv4
  ipFamilyPolicy: SingleStack
  ports:
  - name: client
    port: 2379
    protocol: TCP
    targetPort: 2379
  - name: server
    port: 2380
    protocol: TCP
    targetPort: 2380
  selector:
    app: etcd
  sessionAffinity: None
  type: ClusterIP
