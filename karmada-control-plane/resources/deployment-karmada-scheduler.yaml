apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    karmada.io/bootstrapping: app-defaults
  name: karmada-scheduler
  namespace: karmada-system  # kpt-set: ${namespace}
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app: karmada-scheduler
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: karmada-scheduler
      name: karmada-scheduler
      namespace: karmada-system  # kpt-set: ${namespace}
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - karmada-scheduler
            topologyKey: kubernetes.io/hostname
      automountServiceAccountToken: false
      containers:
      - command:
        - /bin/karmada-scheduler
        - --kubeconfig=/etc/karmada/config/karmada.config
        - --metrics-bind-address=$(POD_IP):8080
        - --health-probe-bind-address=$(POD_IP):10351
        - --enable-scheduler-estimator=true
        - --leader-elect=true
        - --scheduler-estimator-ca-file=/etc/karmada/pki/ca.crt
        - --scheduler-estimator-cert-file=/etc/karmada/pki/karmada.crt
        - --scheduler-estimator-key-file=/etc/karmada/pki/karmada.key
        - --leader-elect-resource-namespace=karmada-system
        - --v=4
        env:
        - name: POD_IP
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        image: docker.io/karmada/karmada-scheduler:v1.17.1  # kpt-set: ${image-karmada-scheduler}
        imagePullPolicy: IfNotPresent
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /healthz
            port: 10351
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 15
          successThreshold: 1
          timeoutSeconds: 5
        name: karmada-scheduler
        ports:
        - containerPort: 8080
          name: metrics
          protocol: TCP
        resources: {}
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
        volumeMounts:
        - mountPath: /etc/karmada/config
          name: karmada-config
          readOnly: true
        - mountPath: /etc/karmada/pki
          name: karmada-cert
          readOnly: true
      dnsPolicy: ClusterFirst
      priorityClassName: system-node-critical
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoExecute
        operator: Exists
      volumes:
      - name: karmada-config
        secret:
          defaultMode: 420
          secretName: karmada-scheduler-config
      - name: karmada-cert
        secret:
          defaultMode: 420
          secretName: karmada-cert
